<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2Morrow Login</title>
    <link rel="stylesheet" href="./login.css">
    <link rel="stylesheet" href="https://fontawesome.com">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://kit.fontawesome.com/988c019cd9.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="container">
        <div class="content">

            <!-- Left Side -->
            <div class="left">
                <div class="left-content">
                    <div class="logo"><img src="./uploads/logo.png" alt="logo"></div>

                    <h2>Login</h2>

                    <form>
                        <input type="email" placeholder="Email id" required>

                        <div class="password-box">
                            <input type="password" placeholder="Enter your password" required>
                            <i class="fa-sharp fa-solid fa-eye-slash"></i>
                        </div>

                        <div class="options">
                            <label>
                                <input type="checkbox" checked> <span>Remember me</span>
                            </label>
                            <a href="#">Forgot password?</a>
                        </div>

                        <button type="submit">Login</button>
                    </form>

                    <p class="signin-text">Sign in with</p>

                    <div class="social">
                        <a href="#"><img src="./uploads//free-google-icon-svg-download-png-189824.webp"
                                alt="google-logo" /></a>
                        <a href="#"><img src="./uploads/747.png" alt=""></a>
                    </div>
                </div>
            </div>

            <!-- Right Side -->
            <div class="right">
                <div class="carousel">

                    <div class="carousel-track">
                        <div class="building1">
                            <img src="./uploads/building-img1.png" alt="building" class="building-img1">
                            <h2>Welcome to 2Morrow Real Estate</h2>
                            <p>Find you place where dreams become reality</p>
                        </div>

                        <div class="building2">
                            <img src="./uploads/building-img1.png" alt="building" class="building-img1">
                            <h2>Welcome to 2Morrow Real Estate</h2>
                            <p>Find you place where dreams become reality</p>
                        </div>

                        <div class="building3">
                            <img src="./uploads/building-img1.png" alt="building" class="building-img1">
                            <h2>Welcome to 2Morrow Real Estate</h2>
                            <p>Find you place where dreams become reality</p>
                        </div>
                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="./login.js"></script>

</body>

</html>
