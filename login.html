<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2Morrow Login</title>
    <link rel="stylesheet" href="./login.css">
    <link rel="stylesheet" href="https://fontawesome.com">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://kit.fontawesome.com/988c019cd9.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="container">
        <div class="content">

            <!-- Left Side -->
            <div class="left">
                <div class="left-content">
                    <div class="logo"><img src="./uploads/logo.png" alt="logo"></div>

                    <h2>Login</h2>

                    <div class="box">
                        <form>
                            <div class="inputBox">
                                <input type="email" name="email" required placeholder=" "
                                    onkeyup="this.setAttribute('value', this.value);" value="">
                                <label>Email id</label>
                            </div>

                            <div class="password-box">
                                <div class="inputBox">
                                    <input type="password" id="password" name="text" required placeholder=" "
                                        onkeyup="this.setAttribute('value', this.value);" value="">
                                    <label>Enter your password</label>
                                </div>
                                <i class="fa-sharp fa-solid fa-eye-slash" id="togglePassword"></i>
                            </div>

                            <div class="options">
                                <label>
                                    <input type="checkbox" checked> <span>Remember me</span>
                                </label>
                                <a href="#">Forgot password?</a>
                            </div>

                            <button type="submit">Login</button>
                        </form>
                    </div>

                    <p class="signin-text">Sign in with</p>

                    <div class="social">
                        <a href="#"><img src="./uploads//free-google-icon-svg-download-png-189824.webp"
                                alt="google-logo" /></a>
                        <a href="#"><img src="./uploads/747.png" alt=""></a>
                    </div>
                </div>
            </div>

            <!-- Right Side -->
            <div class="right">
                <div class="carousel">

                    <div class="mySlides fade">
                        <img src="./uploads/building-img1.png" class="building-img">

                    </div>

                    <div class="mySlides fade">
                        <img src="./uploads/building-img2.png" class="building-img">

                    </div>

                    <div class="mySlides fade">
                        <img src="./uploads/building-img3.png" class="building-img">

                    </div>

                    <div class="right-text">
                        <h2>Welcome to 2Morrow Real Estate</h2>
                        <p>Find your place where dreams become reality</p>
                    </div>

                    <!-- DOTS -->
                    <div class="dots">
                        <span class="dot" onclick="currentSlide(1)"></span>
                        <span class="dot" onclick="currentSlide(2)"></span>
                        <span class="dot" onclick="currentSlide(3)"></span>
                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="./login.js"></script>

</body>

</html>
